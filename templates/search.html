<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body>
    <main class="container">
        <hgroup>
            <h1>Job Scraper for {{name}}</h1>
            <h4>"{{keyword}}" 에 대한 검색결과 입니다.</h4>
            <a target="_blank" href="/export?keyword={{keyword}}">Export to file &rArr;</a>
        </hgroup>

        <div class="overflow-auto">

            <table role="striped">
                <thead data-theme="light">
                    <tr>
                        <th>Title</th>
                        <th>Company</th>
                        <th>Career</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody>
                    {% for job in jobs %}
                    <tr>
                        <td>{{job.title}}</td>
                        <td>{{job.company}}</td>
                        <td>{{job.career}}</td>
                        <td>
                            <a href="{{job.link}}" target="_blank">공고확인</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </main>
</body>

</html>
